name: EcoGuard CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov flake8 flask requests
      - name: Run agent tests
        run: |
          cd agents
          python -m pytest test_*.py -v --tb=short || true
      - name: Run code quality checks
        run: |
          flake8 agents/*.py --max-line-length=120 --count --statistics || true

  collect-real-data:
    runs-on: ubuntu-latest
    needs: test-agents
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install flask requests
      - name: Collect real data
        run: |
          python collect_real_data.py

  build-dashboard:
    runs-on: ubuntu-latest
    needs: collect-real-data
    steps:
      - uses: actions/checkout@v4
      - name: Build dashboard
        run: |
          echo "Building EcoGuard Dashboard..."
          mkdir -p ./public/api
          cp -r dashboards/data/* ./public/api/
          echo "Dashboard files ready for deployment"

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
