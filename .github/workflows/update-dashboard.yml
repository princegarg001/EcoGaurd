name: Update EcoGuard Dashboard Daily

# This workflow will automatically run every 24 hours and can also be triggered manually
on:
  schedule:
    # Runs at 00:00 (Midnight) UTC every single day
    - cron: '0 0 * * *'
  
  # Allows you to trigger this workflow manually from the Actions tab in GitHub
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push changes back to the repository

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests flask flask-cors python-dotenv

      - name: 🌍 Run EcoGuard Data Collector
        # These secrets must be added to your GitHub repository:
        # Settings > Secrets and variables > Actions > New repository secret
        env:
          ELECTRICITY_MAPS_API_KEY: ${{ secrets.ELECTRICITY_MAPS_API_KEY }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          CI_PROJECT_ID: '80410036'
          RUNNER_REGION: 'IN'
        run: |
          python collect_real_data.py

      - name: 💾 Commit and Push Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📈 chore: Update daily EcoGuard metrics [skip ci]"
          branch: main
          file_pattern: 'dashboards/data/*.json'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
